name: Build NCM2FLAC Windows Release
# 新增：开放 Release 写入权限
permissions:
  contents: write
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_tag:
        description: '要上传到的目标版本号（如 v2.0）'
        required: true
        default: 'v2.0'
jobs:
  build_win:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --clean --onefile --windowed `
            --name "NCM2FLAC" `
            --runtime-hook hook-torch-preload.py `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import Crypto.Cipher.AES `
            --hidden-import Crypto.Util.Padding `
            --hidden-import mutagen.flac `
            --hidden-import mutagen.mp3 `
            --hidden-import mutagen.id3 `
            ncm2flac_gui.py
      - name: Upload EXE to Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # tag推送用自带的tag，手动运行用输入框填的tag
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_tag || github.ref_name }}
          files: dist/NCM2FLAC.exe
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
